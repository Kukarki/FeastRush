<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeastRush | Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1e272e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="checkout-card" style="background: #2d3436; padding: 40px; border-radius: 12px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="color: white; margin-bottom: 20px;">🔒 Admin Access</h2>
        
        <form id="login-form">
            <input type="password" id="admin-pass" placeholder="Enter Master Password" required 
                   style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: none; background: #1e272e; color: white; text-align: center; font-size: 1.2rem;">
            
            <button type="submit" class="place-order-btn" style="width: 100%;">Unlock Dashboard</button>
        </form>
        
        <p id="error-msg" style="color: #e74c3c; margin-top: 15px; display: none; font-weight: bold;">Incorrect Password</p>
        <a href="index.html" style="color: #7f8c8d; text-decoration: none; display: block; margin-top: 20px; font-size: 0.9rem;">← Back to Menu</a>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            
            // Your secret password! Change this to whatever you want.
            if (pass === 'bossmode123') {
                // Give the user the "VIP Wristband"
                sessionStorage.setItem('feast_admin_auth', 'true');
                // Send them to the real dashboard
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
